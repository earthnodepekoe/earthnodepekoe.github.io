# ASCII-Font
# http://patorjk.com/software/taag/#p=display&f=Slant&t=Phlow

# Website Configuration

title: 'Pekoe'
slogan: 'Official WorldMobile EarthNode'
description: 'Your phone. Your data. Your rewards. Join the first private WorldMobile network that pays you back.'
credits: '<p>Created by Pekoe EarthNode © 2025 Pekoe, LLC. All rights reserved.</p>'
author: Pekoe EarthNode

# Site URL Configuration
url: 'https://earthnodepekoe.github.io'
baseurl: ''

# Content Improvement (GitHub Edit Link)
improve_content: 'https://github.com/earthnodepekoe/earthnodepekoe/edit/gh-pages'

# Image Directory URL
urlimg: '/images/'

# Logo
logo: 'logo.png'

# Plugins
plugins:
  - jekyll-asciidoc
  - jekyll-gist
  - jekyll-paginate

# Pagination
paginate: 5
paginate_path: 'blog/page:num'

# Markdown and Permalinks
markdown: kramdown
permalink: '/:categories/:title/'
highlight: rouge
excerpt_separator: "<!--more-->"
include:
  - '.htaccess'
exclude:
  - .sass-cache
  - Gemfile
  - Gemfile.lock
  - LICENSE
  - README.md
  - INSTALL.md
  - vendor

# Language
language: 'en'

# HTML Compression
compress_html:
  clippings: all
  comments: ['<!-- ', ' -->']
  endings: all
  profile: false
  ignore:
    envs: [development]

# Default Settings
defaults:
  - scope:
      path: ''
      type: 'pages'
    values:
      show_meta: false
      comments: false
      author: Pekoe EarthNode
  - scope:
      path: ''
      type: 'posts'
    values:
      show_meta: true
      comments: false
      author: Pekoe EarthNode

# Webmaster Tools Verification
google_site_verification: 'Vk0IOJ2jwG_qEoG7fuEXYqv0m2rLa8P778Fi_GrsgEQ'
bing_webmastertools_id: '0FB4C028ABCF07C908C54386ABD2D97F'

# Favicon and Touch Icons
favicon-32x32: 'favicon-32x32.png'
touch-icon-192x192: 'touch-icon-192x192.png'
apple-touch-icon-180x180: 'apple-touch-icon-180x180-precomposed.png'
msapplication_tileimage: 'msapplication_tileimage.png'
msapplication_tilecolor: '#fabb00'

# Open Graph Metadata (Facebook Optimization)
og_image: 'http://images.phlow.de/phlow/phlow_de-logo-512x.png'
og_locale: 'en_EN'
og_type: 'website'

# Social Media Links
socialmedia:
  twitter: 'phlow'
  facebook: 'phlow.media'

# SASS Configuration
sass:
  sass_dir: '_sass'
  style: :compressed

# Google Analytics (Optional)
# google_analytics_tracking_id:

# AsciiDoctor Configuration
asciidoctor-enabled: false
asciidoctor:
  description: ''
  attributes:
    source-highlighter: coderay
    coderay-css: style
    icons: font
